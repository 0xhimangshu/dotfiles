[global]
monitor = 0
width = (0, 10%)
height = 300
origin = top-right
offset = 10x40
notification_limit = 4
padding = 16
horizontal_padding = 16
frame_width = 3
separator_height = 2
sort = yes
idle_threshold = 120
line_height = 0
markup = full
format = "<b>%s</b>\n%b"
alignment = left
vertical_alignment = center
show_age_threshold = 60
word_wrap = yes
ignore_newline = no
stack_duplicates = true
hide_duplicate_count = false
show_indicators = yes
icon_position = left
max_icon_size = 64
sticky_history = yes
default_timeout = 10
ignore_dbusclose = false
mouse_left_click = do_action, close_current
mouse_middle_click = close_current
mouse_right_click = close_all

[urgency_low]
timeout = 5
background = "#282828"
foreground = "#ebdbb2"
frame_color = "#458588"

[urgency_normal]
timeout = 10
background = "#282828"
foreground = "#ebdbb2"
frame_color = "#b16286"

[urgency_critical]
timeout = 0
background = "#cc241d"
foreground = "#fbf1c7"
frame_color = "#fb4934"